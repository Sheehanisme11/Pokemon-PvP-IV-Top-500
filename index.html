<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#b91c1c"><title>Great League Bulk IV Finder</title><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"></head><body><header class="hero"><p class="eyebrow">Pokémon GO PvP</p><h1>Great League Bulk IV Finder</h1><p class="subtitle">Top 500 IV spreads, ranked by Defense + HP first, then Attack. Level 51 enabled.</p></header><main><section class="panel"><label for="search">Search Pokémon or form</label><input id="search" type="search" placeholder="Try Mimikyu, Altaria, Corsola, Galarian..."><div class="row"><select id="pokemonSelect"></select><button id="loadBtn">Load</button></div><div class="row mini"><button id="prevBtn" class="ghost">Previous</button><button id="nextBtn" class="ghost">Next</button></div></section><section class="panel summary" id="summaryPanel"><h2>Loading database…</h2><p>Please wait while the index loads.</p></section><section class="panel" id="filtersPanel" hidden><div class="filterGrid"><label>Show ranks<select id="rankLimit"><option value="25">Top 25</option><option value="50">Top 50</option><option value="100">Top 100</option><option value="250">Top 250</option><option value="500" selected>Top 500</option></select></label><label>Minimum HP<input id="minHp" type="number" placeholder="Any"></label><label>Minimum Defense<input id="minDef" type="number" placeholder="Any"></label><label>IV search<input id="ivSearch" type="search" placeholder="0/15/15"></label></div></section><section class="tableWrap" id="tableWrap" hidden><table id="rankTable"><thead><tr><th>Rank</th><th>IVs</th><th>Lvl</th><th>CP</th><th>Atk</th><th>Def</th><th>HP</th><th>Bulk</th><th>SP</th></tr></thead><tbody></tbody></table></section></main><footer><p>Shadow variants use the same CP/stat table as non-shadow Pokémon.</p></footer><script src="app.js"></script></body></html>
